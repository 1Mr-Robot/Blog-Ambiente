server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html/pages;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }

    location /styles/ {
        alias /usr/share/nginx/html/styles/;
    }

    location /images/ {
        alias /usr/share/nginx/html/images/;
    }
}